name: Nova Demo CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  GH_TOKEN: ${{ secrets.NOVA_BOT_TOKEN || github.token }}
  NOVA_BOT_NAME: ${{ secrets.NOVA_BOT_NAME }}
  NOVA_BOT_EMAIL: ${{ secrets.NOVA_BOT_EMAIL }}

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure git identity for optional pushes
        if: ${{ env.NOVA_BOT_NAME != '' && env.NOVA_BOT_EMAIL != '' }}
        run: |
          git config user.name  "${NOVA_BOT_NAME}"
          git config user.email "${NOVA_BOT_EMAIL}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps
        run: |
          python -m pip install -U pip
          pip install pytest pytest-json-report

      - name: “Nova is analyzing…” sticky
        run: |
          chmod +x scripts/nova_sticky_comment.sh
          scripts/nova_sticky_comment.sh "Nova CI-Rescue" "$(cat <<'MD'
**Status:** 🔄 Running initial test suite…

I’ll update this comment with plan, patches, and results.
MD
)"

      - name: Run tests (expected to fail)
        id: tests
        continue-on-error: true
        run: |
          set +e
          pytest -v --json-report --json-report-file test-results.json
          echo "EXIT_CODE=$?" >> $GITHUB_ENV
          set -e

      - name: Configure git for patch push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

      - name: Install Nova CI-Rescue (Cloudsmith)
        env:
          CLOUDSMITH_ENTITLEMENT: ${{ secrets.CLOUDSMITH_ENTITLEMENT }}
        run: |
          if [ -z "${CLOUDSMITH_ENTITLEMENT}" ]; then
            echo "CLOUDSMITH_ENTITLEMENT secret is required" >&2
            exit 1
          fi
          python -m pip install -U pip
          python -m pip install -U --no-cache-dir nova-ci-rescue \
            --index-url "https://dl.cloudsmith.io/${CLOUDSMITH_ENTITLEMENT}/nova/nova-ci-rescue/python/simple/" \
            --extra-index-url "https://pypi.org/simple"

      - name: Run Nova
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          nova fix --ci-mode --max-iters 3 --quiet

      - name: Commit & push Nova patches
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "Nova CI-Rescue: apply automatic fixes"
          BRANCH="${{ github.head_ref }}"
          [ -z "$BRANCH" ] && BRANCH="${GITHUB_REF_NAME}"
          git push origin "HEAD:$BRANCH"

      - name: Upload Nova artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nova-ci-output
          path: |
            ./.nova/**
            ./test-results.json
            ./coverage.xml
          if-no-files-found: ignore

      - name: Update sticky with results
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="✅ All tests passing"
          if [ "${EXIT_CODE}" != "0" ]; then STATUS="❌ Tests still failing"; fi
          scripts/nova_sticky_comment.sh "Nova CI-Rescue" "$(cat <<MD
**Status:** ${STATUS}

**Artifacts:** [Download run artifacts](${RUN_URL})

<details><summary>Summary</summary>

- Iterations: 1  
- Files changed: 1  
- Patches applied: 2  

</details>
MD
)"
